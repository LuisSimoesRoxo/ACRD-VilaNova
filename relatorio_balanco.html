<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACRD Vila Nova - Balanço</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/css_relatorio_balanco.css">
</head>
<body data-page="relatorio_balanco">
  <div id="app">
    <header class="header">
      <button class="menu-toggle" id="menuToggle" title="Mostrar / ocultar menu">☰</button>
      <img src="assets/logo.png" alt="Logotipo ACRD" class="header-logo">
      <div class="page-title">Balanço</div>
      <div class="header-grow"></div>
      <input id="globalSearch" class="header-search" type="search" placeholder="Pesquisar">
      <button id="openDataFolderBtn" class="tool-btn" title="Abrir pasta de dados">Dados</button>
      <span id="dataFolderStatus" class="small-note">Dados: amostra</span>
      <button class="theme-toggle" id="themeToggle" title="Tema claro / escuro">◐</button>
      <select id="yearFilter" class="header-year"></select>
    </header>
    <aside class="sidebar" id="sidebar">
      <iframe class="menu-frame" id="menuFrame" title="Menu" src="partials/menu.html?page=relatorio_balanco"></iframe>
    </aside>
    <main class="main" id="main">
      <div class="page-grid"><section class="report-card"><div class="actions-row"><button class="action-btn print" id="printBtn">Imprimir</button></div><div class="report-header-center"><img src="assets/logo.png" alt="logo" class="print-logo"><div class="report-title-main">BALANÇO EXERCÍCIO DO ANO</div></div><div id="balancoContent"></div></section></div>
    </main>
    <footer class="footer">
      <img src="assets/logo.png" alt="Logotipo ACRD" class="footer-logo">
      <span id="footerYear">Ano: 2026</span>
      <span id="footerDespesa">Despesa: 0,00 €</span>
      <span id="footerReceita">Receita: 0,00 €</span>
      <span id="footerSaldo">Saldo: 0,00 €</span>
      <span id="footerBanco">Banco: 0,00 €</span>
      <span id="footerCaixa">Caixa: 0,00 €</span>
    </footer>
  </div>
  <script src="js/common.js"></script>
  <script src="js/app_relatorio_balanco.js"></script>
</body>
</html>
