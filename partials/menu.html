  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const page = params.get('page');

    document.querySelectorAll('.menu-link').forEach((a) => {
      a.classList.toggle('active', a.dataset.page === page);
    });

    function applyTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
    }

    // tema inicial
    try {
      const isDark = !!(parent && parent.document && parent.document.body.classList.contains('dark'));
      applyTheme(isDark ? 'dark' : 'light');
    } catch (err) {
      console.error('Falha a ler tema inicial do menu:', err);
    }

    // tema em tempo real vindo da página principal
    window.addEventListener('message', (event) => {
      if (!event.data || event.data.type !== 'acrd-theme') return;
      applyTheme(event.data.theme);
    });
  </script>
</body>
</html>
