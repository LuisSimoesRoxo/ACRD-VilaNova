<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACRD Vila Nova - Faturação</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/css_faturacao.css">
</head>
<body data-page="faturacao">
  <div id="app">
    <header class="header">
      <button class="menu-toggle" id="menuToggle" title="Mostrar / ocultar menu">☰</button>
      <img src="assets/logo.png" alt="Logotipo ACRD" class="header-logo">
      <div class="page-title">Faturação</div>
      <div class="header-grow"></div>
      <input id="globalSearch" class="header-search" type="search" placeholder="Pesquisar">
      <button id="openDataFolderBtn" class="tool-btn" title="Abrir pasta de dados">Dados</button>
      <span id="dataFolderStatus" class="small-note">Dados: amostra</span>
      <button class="theme-toggle" id="themeToggle" title="Tema claro / escuro">◐</button>
      <select id="yearFilter" class="header-year"></select>
    </header>
    <aside class="sidebar" id="sidebar">
      <iframe class="menu-frame" id="menuFrame" title="Menu" src="partials/menu.html?page=faturacao"></iframe>
    </aside>
    <main class="main" id="main">
      
<div class="page-grid">
  <section class="card toolbar"><div class="card-body">
    <div class="actions-row">
      <button class="action-btn print" id="printSelectedBtn">Imprimir selecionados</button>
      <button class="action-btn print" id="printFilteredBtn">Imprimir filtrados</button>
      <button class="action-btn print" id="printAllBtn">Imprimir tudo</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Data</label><input id="new_data" type="date"></div>
      <div class="field"><label>Evento</label><select id="new_evento_id"></select></div>
      <div class="field"><label>Fornecedor</label><select id="new_fornecedor_id"></select></div>
      <div class="field"><label>Nº Fatura</label><input id="new_numero_fatura" type="text"></div>
      <div class="field"><label>Origem</label><select id="new_origem"></select></div>
      <div class="field"><label>Código ACRD</label><select id="new_codigo_acrd_id"></select></div>
      <div class="field"><label>Tipo</label><select id="new_tipo"></select></div>
      <div class="field"><label>Montante (€)</label><input id="new_montante" type="number" step="0.01"></div>
      <div class="field"><label>Descrição</label><input id="new_descricao" type="text"></div>
      <div class="field"><label>Situação</label><select id="new_situacao"></select></div>
      <div class="field"><label>Verif. FT</label><select id="new_verif_ft"></select></div>
    </div>
    <div class="actions-row"><button class="action-btn primary" id="saveNewBtn">Guardar</button><button class="action-btn" id="cancelNewBtn">Cancelar</button></div>
  </div></section>
  <section class="card table-wrap">
    <table class="data-table"><thead><tr><th></th><th data-key="ano">Ano</th><th data-key="data">Data</th><th data-key="evento_id">Evento</th><th data-key="fornecedor_id">Fornecedor</th><th data-key="numero_fatura">Nº Fatura</th><th data-key="origem">Origem</th><th data-key="codigo_acrd_id">Código</th><th data-key="tipo">Tipo</th><th data-key="montante">Montante</th><th data-key="descricao">Descrição</th><th data-key="situacao">Situação</th><th data-key="verif_ft">Verif. FT</th><th data-key="updated_by">Alterado por</th><th>Ações</th></tr></thead><tbody id="tableBody"></tbody></table>
    <div class="empty" id="emptyState" hidden>Sem movimentos.</div>
  </section>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer"><div class="drawer-header"><strong>Editar movimento</strong></div><div class="drawer-body">
      <div class="field"><label>Data</label><input id="edit_data" type="date"></div>
      <div class="field"><label>Evento</label><select id="edit_evento_id"></select></div>
      <div class="field"><label>Fornecedor</label><select id="edit_fornecedor_id"></select></div>
      <div class="field"><label>Nº Fatura</label><input id="edit_numero_fatura" type="text"></div>
      <div class="field"><label>Origem</label><select id="edit_origem"></select></div>
      <div class="field"><label>Código ACRD</label><select id="edit_codigo_acrd_id"></select></div>
      <div class="field"><label>Tipo</label><select id="edit_tipo"></select></div>
      <div class="field"><label>Montante (€)</label><input id="edit_montante" type="number" step="0.01"></div>
      <div class="field"><label>Descrição</label><input id="edit_descricao" type="text"></div>
      <div class="field"><label>Situação</label><select id="edit_situacao"></select></div>
      <div class="field"><label>Verif. FT</label><select id="edit_verif_ft"></select></div>
  </div><div class="drawer-footer"><button class="action-btn primary" id="saveEditBtn">Guardar</button><button class="action-btn" id="cancelEditBtn">Cancelar</button><button class="action-btn warn" id="deleteEditBtn">Eliminar</button></div></aside>
</div>

    </main>
    <footer class="footer">
      <img src="assets/logo.png" alt="Logotipo ACRD" class="footer-logo">
      <span id="footerYear">Ano: 2026</span>
      <span id="footerDespesa">Despesa: 0,00 €</span>
      <span id="footerReceita">Receita: 0,00 €</span>
      <span id="footerSaldo">Saldo: 0,00 €</span>
      <span id="footerBanco">Banco: 0,00 €</span>
      <span id="footerCaixa">Caixa: 0,00 €</span>
    </footer>
  </div>
  <script src="js/common.js"></script>
  <script src="js/app_faturacao.js"></script>
</body>
</html>
